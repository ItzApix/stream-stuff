<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hype Train</title>
  <link rel="stylesheet" href="stylesheet.css" />
  <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client/dist/streamerbot-client.js"></script>
</head>
<body>
  <div id="confetti-layer"></div>

  <div id="hype-train-overlay">
    <div id="hype-train-stack">
      <div id="hype-train-bar">
        <div id="hype-train-fill"></div>
        <div class="hype-text left" id="hype-percent">0%</div>
        <div class="hype-text center" id="hype-train-title">HYPE TRAIN</div>
        <div class="hype-text right" id="hype-timer">00:00</div>
      </div>

      <div id="hype-level-shell">
        <div id="hype-level">Level 0</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
